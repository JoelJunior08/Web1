
<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Formulário</title>
	</head>
	<body>
		<a href="../atividades.html" target="_self"><img src="assets/Seta.png" width="50px" height="50px"></a><br>
	
		<div style="text-align: center">
			<h1>Formulário</h1>
			<form action="14fenviado.html" method="get">
				<label for="name">Digite seu nome:</label><br>
				<input type="text" id="name" size="50px"><br>
				<label for="number">Digite sua data de nascimento:</label><br>
				<input type="date" id="number"><br>
				<label for="endereco">Digite seu endereço:</label><br>
				<input type="text" id="endereco" size="50px"><br>
				<label for="pet">Descreva o seu pet:</label><br>
				<textarea id="pet" rows="2" cols="50" placeholder="Digite a sua mensagem"></textarea><br>
				<label for="senha">Digite sua senha:</label><br>
				<input type="password" id="senha"><br>
				<label for="csenha">Confirme sua senha:</label><br>
				<input type="password" id="csenha"><br>
				<input type="radio" name="plano" value="a">Plano A<br>
				<input type="radio" name="plano" value="b">Plano B<br>
				<label for="name">Confirmo que Li e Aceito os termos:</label><br>
				<input type="checkbox" id="name"><br>
				<input type="submit" id="enviar">
			</form>
		</div>
	</body>
</html>
