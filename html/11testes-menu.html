<!DOCTYPE html>
	<html lang="pt-br">
		<head>
			<meta charset="UTF-8">
			<title>Menu's</title>
			<style>
				ul{
					list-style: none;
					padding: 0;
				}
				li{
					background: #eee;
					margin: 5px;
					padding: 10px;
				}
				li a {
					text-decoration: none;
					color: black;
					display: block;
				}
				li:hover {
					background: #ccc;
				}
				</style>
				<!--1-Remove as bolinhas da lista-->
				<!--2-adiciona uma borda à lista-->
				<!--3-Muda de cor do texto da lista-->
				<!--4-Muda de cor ao passar o mouse-->
		</head>
		<body>
			<a href="../atividades.html" target="_self"><img src="assets/seta.png" width="50px" height="50px"></a><br>
			<button onclick="mostrarmenu()" style="font-size:20px"><img src="assets/menu.png" width="30px" height="30px"></button>
				<ul id="menu" style="display: none;">
					<li><a href="11testesmenu/8Cardapio.html">Cardápio</a></li>
					<li><a href="11testesmenu/9Bahia.html">Bahia</a></li>
					<li><a href="11testesmenu/10escalacao-bahia.html">Bahia - Escalação</a></li>
				</ul>
				<script>
				function mostrarmenu(){
					var menu = document.getElementById("menu");
						if (menu.style.display ==="none"){
							menu.style.display = "block";
						} else{
							menu.style.display = "none";
							}
				}
				</script>
		</body>
	</html>
